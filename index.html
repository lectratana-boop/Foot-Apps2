<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foot Apps Pro v3.0</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Header & Secret */
        .header { text-align: center; cursor: pointer; user-select: none; }
        .secret-area { display: none; background: #f9f9f9; padding: 15px; border: 2px dashed var(--primary); margin: 10px 0; border-radius: 8px; }
        
        /* Navigation */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 10px 20px; border: none; background: #ddd; cursor: pointer; border-radius: 5px; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Finance Warning */
        .debt-alert { border: 3px solid var(--danger) !important; background: #fff5f5; }

        /* Buttons */
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-reset { background: var(--danger); width: 100%; margin-top: 20px; }
        .btn-save { background: var(--accent); }
        
        .phase-filter { margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-chip { padding: 5px 12px; border: 1px solid #ccc; border-radius: 20px; cursor: pointer; font-size: 0.9em; }
        .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="auth-screen" class="container" style="text-align: center;">
    <h1 class="header" onclick="handleSecretClick()">Foot Apps Pro 3.0</h1>
    <p>Veuillez entrer votre code d'accès</p>
    <input type="text" id="license-key" placeholder="FA-XXXX-XXXX" style="padding: 10px; width: 200px;">
    <button class="btn btn-save" onclick="validateLicense()">Activer</button>

    <div id="admin-panel" class="secret-area">
        <h3>Générateur Master Admin</h3>
        <input type="password" id="master-pwd" placeholder="Mot de passe Maître">
        <button class="btn btn-save" onclick="generateCode()">Générer Code (4 mois)</button>
        <p id="generated-code-display" style="font-weight: bold; color: var(--accent); margin-top: 10px;"></p>
    </div>
</div>

<div id="main-app" class="container hidden">
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('config')">Configuration</button>
        <button class="tab-btn" onclick="showTab('calendar')">Calendrier</button>
        <button class="tab-btn" onclick="showTab('finance')">Finances</button>
        </div>

    <div id="tab-config" class="tab-content">
        <h2>Paramètres du Tournoi</h2>
        <div style="background: #eee; padding: 15px; border-radius: 8px;">
            <button class="btn btn-reset" onclick="triggerReset()">🔴 RÉINITIALISER L'APPLICATION</button>
        </div>
    </div>

    <div id="tab-calendar" class="tab-content hidden">
        <h2>Gestion des Matchs</h2>
        <div class="phase-filter" id="phase-filters">
            <span class="filter-chip active" onclick="filterPhase('Eliminatoire')">Éliminatoires</span>
            <span class="filter-chip" onclick="filterPhase('16emes')">16èmes</span>
            <span class="filter-chip" onclick="filterPhase('8emes')">8èmes</span>
            <span class="filter-chip" onclick="filterPhase('Quarts')">Quarts</span>
            <span class="filter-chip" onclick="filterPhase('Demis')">Demis</span>
            <span class="filter-chip" onclick="filterPhase('Finale')">Finale</span>
        </div>
        
        <button class="btn btn-save" onclick="genAutoRoundRobin()">Générer Auto (Round-Robin)</button>
        
        <div id="calendar-list">
            </div>
    </div>

    <div id="tab-finance" class="tab-content hidden">
        <h2>Pilotage Financier</h2>
        <table id="finance-table">
            <thead>
                <tr>
                    <th>Équipe</th>
                    <th>Matchs Joués</th>
                    <th>Dette</th>
                    <th>Statut</th>
                </tr>
            </thead>
            <tbody id="finance-body"></tbody>
        </table>
    </div>
</div>

<script>
    // --- SYSTÈME DE LICENCE & SECRET ---
    let clickCount = 0;
    function handleSecretClick() {
        clickCount++;
        if (clickCount >= 5) {
            document.getElementById('admin-panel').style.display = 'block';
            clickCount = 0;
        }
    }

    function generateCode() {
        const pwd = document.getElementById('master-pwd').value;
        if (pwd !== "SUPERADMIN") return alert("Accès refusé");
        
        const now = new Date();
        const expiry = new Date(now.setMonth(now.getMonth() + 4)).getTime();
        const code = "FA-" + Math.floor(Math.random() * 9000 + 1000) + "-" + btoa(expiry).substring(0, 8).toUpperCase();
        document.getElementById('generated-code-display').innerText = "Code Généré : " + code;
    }

    function validateLicense() {
        const key = document.getElementById('license-key').value;
        try {
            const parts = key.split('-');
            const expiryEncoded = parts[2];
            const expiryDate = parseInt(atob(expiryEncoded));
            
            if (expiryDate > Date.now()) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadData();
            } else {
                alert("Abonnement Expiré !");
            }
        } catch (e) {
            alert("Code invalide");
        }
    }

    // --- ALGORITHME ROUND-ROBIN (Correction Bug Doublons) ---
    function genAutoRoundRobin() {
        // Simulation de données équipes par poules
        const poules = {
            "A": ["Equipe 1", "Equipe 2", "Equipe 3", "Equipe 4"],
            "B": ["Equipe 5", "Equipe 6", "Equipe 7", "Equipe 8"]
        };
        
        let newMatches = [];
        for (let p in poules) {
            let teams = poules[p];
            // Algorithme Round-Robin pour garantir l'unicité des rencontres
            for (let i = 0; i < teams.length; i++) {
                for (let j = i + 1; j < teams.length; j++) {
                    newMatches.push({
                        poule: p,
                        home: teams[i],
                        away: teams[j],
                        phase: "Eliminatoire",
                        played: false
                    });
                }
            }
        }
        saveMatches(newMatches);
        renderCalendar("Eliminatoire");
    }

    // --- FILTRAGE DES PHASES ---
    function filterPhase(phase) {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        renderCalendar(phase);
    }

    // --- FINANCES & CADRAGE ROUGE ---
    function renderFinances() {
        const teams = [
            { name: "Equipe 1", played: 2, debt: 50 },
            { name: "Equipe 2", played: 3, debt: 0 }
        ];
        
        const tbody = document.getElementById('finance-body');
        tbody.innerHTML = "";
        
        teams.forEach(t => {
            // Règle : 2 matchs joués + dette > 0 = Alerte Rouge
            const isAlert = (t.played >= 2 && t.debt > 0);
            const row = `<tr class="${isAlert ? 'debt-alert' : ''}">
                <td>${t.name}</td>
                <td>${t.played}</td>
                <td>${t.debt}€</td>
                <td>${isAlert ? '⚠️ BLOQUÉ' : '✅ OK'}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // --- RÉINITIALISATION TOTAL ---
    function triggerReset() {
        const confirmStr = prompt("Taper 'RESET' pour tout effacer :");
        if (confirmStr === "RESET") {
            localStorage.clear();
            location.reload();
        }
    }

    // --- NAVIGATION ---
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.remove('hidden');
        if(tabId === 'finance') renderFinances();
    }

    function saveMatches(m) { localStorage.setItem('matches', JSON.stringify(m)); }
    function loadData() { /* Chargement initial */ }
</script>

</body>
</html>
